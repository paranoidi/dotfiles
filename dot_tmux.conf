# Command with ctrl-a -- long time screen user
unbind C-b
set -g prefix C-a

# Misc binds
bind C choose-client

# Select panes with alt+arrows
# conflicts with vim?
bind -n M-right run -b '~/bin/tmux/flash.sh' \; select-pane -L
bind -n M-left run -b '~/bin/tmux/flash.sh' \; select-pane -R
bind -n M-up run -b '~/bin/tmux/flash.sh' \; select-pane -U
bind -n M-down run -b '~/bin/tmux/flash.sh' \; select-pane -D

# Resize panes alt+ijkl
bind -n -r M-j run -b '~/bin/tmux/flash.sh' \; resize-pane -L
bind -n -r M-k run -b '~/bin/tmux/flash.sh' \; resize-pane -D
bind -n -r M-i run -b '~/bin/tmux/flash.sh' \; resize-pane -U
bind -n -r M-l run -b '~/bin/tmux/flash.sh' \; resize-pane -R

# Change windows with alt pgup/down
bind -n M-pageup run -b '~/bin/tmux/flash.sh' \; previous-window
bind -n M-pagedown run -b '~/bin/tmux/flash.sh' \; next-window

# Reorder current window with ctrl+alt+pgup/down
bind -n C-M-PgUp run -b '~/bin/tmux/flash.sh' \; swap-window -t -1 \; select-window -t -1
bind -n C-M-PgDn run -b '~/bin/tmux/flash.sh' \; swap-window -t +1 \; select-window -t +1

# Direct window selection with Alt+number
bind -n M-1 run -b '~/bin/tmux/flash.sh' \; select-window -t 1
bind -n M-2 run -b '~/bin/tmux/flash.sh' \; select-window -t 2
bind -n M-3 run -b '~/bin/tmux/flash.sh' \; select-window -t 3
bind -n M-4 run -b '~/bin/tmux/flash.sh' \; select-window -t 4
bind -n M-5 run -b '~/bin/tmux/flash.sh' \; select-window -t 5
bind -n M-6 run -b '~/bin/tmux/flash.sh' \; select-window -t 6
bind -n M-7 run -b '~/bin/tmux/flash.sh' \; select-window -t 7
bind -n M-8 run -b '~/bin/tmux/flash.sh' \; select-window -t 8
bind -n M-9 run -b '~/bin/tmux/flash.sh' \; select-window -t 9
bind -n M-0 run -b '~/bin/tmux/flash.sh' \; select-window -t 10

# Open new windows based on current one
bind c new-window -a -c "#{pane_current_path}"

# Horizontal split (stacked panes: top/bottom)
bind h split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vertical split (side-by-side panes: left/right)
bind v split-window -h -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# This is necessary for super-num shortcut to work in cinnamon
#set -g xterm-keys on

# Make ESC more responsive (vim etc) - default is 500ms which is painfully slow
set -sg escape-time 0

# R reload config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# History
set -g history-limit 10000
unbind l
bind l send-keys C-l \; clear-history 

# Last window (C-a C-a)
bind-key C-a last-window

# Start numbering from 1
set -g base-index 1

# Auto-renumber windows when one is closed (prevents gaps like 1, 3, 7)
set -g renumber-windows on

# Display ssh in title?
set -g set-titles on
set -g set-titles-string "#T"

# Easily toggle synchronization (mnemonic: e is for echo)
# sends commands to all panes
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Ctrl-q send the prefix to client inside window (nested tmux on remote)
bind-key -n C-q send-prefix

# K kill session -- for easy restarting
bind K kill-session

# Manual renumber on request (prefix-r) — not needed for closing windows, handy after reorders
bind r command-prompt -p "Renumber windows (base):" -I "1" "move-window -r -t %%"

# longer messages
set-option -g display-time 3500

# gnome-terminal Shift+Enter workaround (Alt-Enter)
bind -n M-Enter send-keys S-Enter

# Allow modifiers with enter (for pi)
#
# 2026-05-05: changed from 'always' back to 'on'.
# 'always' breaks Ctrl-Backspace because shells/readline/vim
# don't understand CSI u (Kitty keyboard protocol).
#
# 'always' was set ~2026-04/05 to fix some modifier issue
# (details forgotten — possibly nested tmux or pi agent key
# combos like Ctrl-Enter, Ctrl-Shift-char). If those regress,
# check pi's DECSET 2026 handshake or switch to explicit
# bind-key entries for those combos instead.
#
# 'on'  = use CSI u only when app opt-in via DECSET 2026 (default)
# 'always' = force CSI u for all apps — breaks Ctrl-Backspace
# 'off' = never use CSI u
set -g extended-keys on

#### THEME ####

# Basic status bar colors
set -g status-bg black
set -g status-fg white

# Left side of status bar, get rid of hostname in left
set -g status-left ''

# Right side of status bar
#set -g status-right-bg black
#set -g status-right-fg red
set -g status-right-length 40
set -g status-right " #(upspeed) #[fg=white]#(downspeed)#[default]"

set -g mode-style fg=yellow,bg=black

# Window status
set-window-option -g window-status-current-format '#[fg=white]#[fg=red,bold]#{window_index} #[fg=green]#(~/bin/tmux/windows-status.sh "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}")#[fg=white] '
set-window-option -g window-status-format '#[fg=white,bold]#{window_index} #[fg=colour244]#(~/bin/tmux/status.sh "#{window_index}" "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}") '

# Current window status
# set -g window-status-current-bg black
# set -g window-status-current-fg cyan

# Window with activity status
#set -g window-status-activity-bg yellow # fg and bg are flipped here due to a
#set -g window-status-activity-fg black  # bug in tmux

# Window separator
set -g window-status-separator ""

# Window status alignment
set -g status-justify left 

# Pane border
#set -g pane-border-bg default
#set -g pane-border-fg default

# Active pane border
#set -g pane-active-border-bg default
#set -g pane-active-border-fg green

# Pane number indicator
set -g display-panes-colour default
set -g display-panes-active-colour default

# Scroll and select like vi
setw -g mode-keys vi  # optional, for vi-style scrolling

# Scroll ctrl-pgup/pgdown by one page
bind-key -n C-PgUp copy-mode \; send-keys -X page-up
bind-key -n C-PgDn copy-mode \; send-keys -X page-down

# Configure mouse scroll wheel to scroll buffer
#set -g mouse on
# ^ There is no way to make mouse only intercept whell, setting mouse on causes a lot of interference
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g mouse off

unbind -T root      WheelUpPane
unbind -T root      WheelDownPane
unbind -T root      MouseDown1Pane
unbind -T root      MouseDrag1Pane
unbind -T root      MouseUp1Pane

unbind -T copy-mode      WheelUpPane
unbind -T copy-mode      WheelDownPane
unbind -T copy-mode-vi   WheelUpPane
unbind -T copy-mode-vi   WheelDownPane

# AI chat panel
unbind i
bind-key i split-window 'fish -c "chat"'

