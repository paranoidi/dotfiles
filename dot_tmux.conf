# Command with ctrl-a -- long time screen user
unbind C-b
set -g prefix C-a

# Misc binds
bind C choose-client

# Select panes with alt+arrows
# conflicts with vim?
bind -n M-right select-pane -L
bind -n M-left select-pane -R
bind -n M-up select-pane -U
bind -n M-down select-pane -D

# Resize panes alt+ijkl
bind -n -r M-j resize-pane -L
bind -n -r M-k resize-pane -D
bind -n -r M-i resize-pane -U
bind -n -r M-l resize-pane -R

# Change windows with alt pgup/down
bind -n M-pageup previous-window
bind -n M-pagedown next-window

# Direct window selection with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Open new windows based on current one
bind c new-window -c "#{pane_current_path}"

# Horizontal split (stacked panes: top/bottom)
bind h split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vertical split (side-by-side panes: left/right)
bind v split-window -h -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# This is necessary for super-num shortcut to work in cinnamon
#set -g xterm-keys on

# Make ESC more responsive (vim etc)
#set -sg escape-time 10

# R reload config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# History
set -g history-limit 10000
unbind l
bind l send-keys C-l \; clear-history 

# Last window (C-a C-a)
bind-key C-a last-window

# Start numbering from 1
set -g base-index 1

# Display ssh in title?
set -g set-titles on
set -g set-titles-string "#T"

# Easily toggle synchronization (mnemonic: e is for echo)
# sends commands to all panes
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Ctrl-q send the prefix to client inside window (nested tmux on remote)
bind-key -n C-q send-prefix

# tmuxinator
#set -g base-index 1
#set -g pane-base-index 1

# K kill session -- for easy restarting
bind K kill-session

# longer messages
set-option -g display-time 3000

# Allow modifiers with enter (for pi)
set -g extended-keys on

#### THEME ####

# Basic status bar colors
set -g status-bg black
set -g status-fg white

# Left side of status bar, get rid of hostname in left
set -g status-left ''

# Right side of status bar
#set -g status-right-bg black
#set -g status-right-fg red
set -g status-right-length 40
set -g status-right " #(upspeed) #[fg=white]#(downspeed)#[default]"

set -g mode-style fg=yellow,bg=black

# Window status
set-window-option -g window-status-current-format '#[fg=white]#[fg=red,bold]#{window_index} #[fg=green]#(tmux-window-status "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}")#[fg=white] '
set-window-option -g window-status-format '#[fg=white,bold]#{window_index} #[fg=colour244]#(tmux-window-status "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}") '

# Current window status
# set -g window-status-current-bg black
# set -g window-status-current-fg cyan

# Window with activity status
#set -g window-status-activity-bg yellow # fg and bg are flipped here due to a
#set -g window-status-activity-fg black  # bug in tmux

# Window separator
set -g window-status-separator ""

# Window status alignment
set -g status-justify left 

# Pane border
#set -g pane-border-bg default
#set -g pane-border-fg default

# Active pane border
#set -g pane-active-border-bg default
#set -g pane-active-border-fg green

# Pane number indicator
set -g display-panes-colour default
set -g display-panes-active-colour default

# Scroll and select like vi
setw -g mode-keys vi  # optional, for vi-style scrolling

# Scroll shift-pgup/pgdown by one page
bind-key -n S-PgUp copy-mode \; send-keys -X page-up
bind-key -n S-PgDn copy-mode \; send-keys -X page-down

# Configure mouse scroll wheel to scroll buffer
#set -g mouse on
# ^ There is no way to make mouse only intercept whell, setting mouse on causes a lot of interference
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g mouse off

unbind -T root      WheelUpPane
unbind -T root      WheelDownPane
unbind -T root      MouseDown1Pane
unbind -T root      MouseDrag1Pane
unbind -T root      MouseUp1Pane

unbind -T copy-mode      WheelUpPane
unbind -T copy-mode      WheelDownPane
unbind -T copy-mode-vi   WheelUpPane
unbind -T copy-mode-vi   WheelDownPane

# AI chat panel
unbind i
bind-key i split-window 'fish -c "chat"'

