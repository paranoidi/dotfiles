[window]
resize_increments = true

[font]
size   = 12
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold   = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }

[colors.primary]
background = "#232528"
foreground = "#EEEEEC"

[colors.normal]
black   = "#2E3436"
red     = "#E66666"
green   = "#A2BD68"
yellow  = "#F0C674"
blue    = "#6485AB"
magenta = "#B294BB"
cyan    = "#8ABEB7"
white   = "#D3D7CF"

[colors.bright]
black   = "#555753"
red     = "#D54E53"
green   = "#9AD949"
yellow  = "#E7C547"
blue    = "#7BAAE0"
magenta = "#C397D8"
cyan    = "#70C0B1"
white   = "#EEEEEC"
