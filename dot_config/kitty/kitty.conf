# Kitty configuration
# Resize window so that it matches to characters correctly
resize_in_steps yes

# Font
font_family       FiraCode Nerd Font
font_family       JetBrainsMono
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         13
modify_font       cell_width 107%
modify_font       cell_height -1px

# Disable ligatures (FiraCode renders ... as ellipsis which looks weird)
disable_ligatures always

# Remove ESC key delay (default 100ms is noticeable in vim/tmux)
esc_delay 0

# Colors
background #232528

# Foreground: use palette color 7 (light text for dark background)
foreground #D3D7CF

# Selection colors
selection_foreground #232528
selection_background #D3D7CF

# Cursor
cursor            #D3D7CF
cursor_text_color #232528

# URL color
url_color #7BAAE0

# Terminal colors (16-color ANSI palette)
color0  #2E3436
color1  #E66666
color2  #A2BD68
color3  #F0C674
color4  #6485AB
color5  #B294BB
color6  #8ABEB7
color7  #D3D7CF
color8  #555753
color9  #D54E53
color10 #9AD949
color11 #E7C547
color12 #7BAAE0
color13 #C397D8
color14 #70C0B1
color15 #EEEEEC

# Active border color
active_border_color #6485AB

# Tab bar
tab_bar_style powerline
tab_bar_edge top
tab_fade 0.25
active_tab_foreground #232528
active_tab_background #6485AB
inactive_tab_foreground #D3D7CF
inactive_tab_background #2E3436

# Bell
visual_bell_duration 0.0
enable_audio_bell no

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 100

# Mouse
mouse_hide_wait 2.0
url_excluded_characters ()

# Ctrl+Left drag for rectangular (block) selection (gnome-terminal standard behaviour)
mouse_map ctrl+left press ungrabbed mouse_selection rectangle

# Fix backspace deleting two characters (disable enhanced keyboard protocol for backspace)
map backspace delete_char_backward_strict

# Fix Shift+Enter: send distinct escape sequence so apps can differentiate from Enter
map shift+enter send_text all \x1b[13;2u

# Performance
repaint_deferral_time 10
input_delay 3
sync_to_monitor no
