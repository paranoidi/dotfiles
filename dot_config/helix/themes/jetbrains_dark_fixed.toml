inherits = "jetbrains_dark"

# Fix cursor visibility: cursor was invisible during selections
# Set cursor as a distinct background block (light grey) so it's always
# visible against the selection bg (#214283) and other dark backgrounds
"ui.cursor" = { fg = "black", bg = "#e0e0e0" }
"ui.cursor.select" = { fg = "black", bg = "#e0e0e0" }
"ui.cursor.insert" = { fg = "black", bg = "#e0e0e0" }
"ui.cursor.primary.select" = { fg = "black", bg = "#e0e0e0" }
"ui.cursor.primary.insert" = { fg = "black", bg = "#e0e0e0" }
"ui.cursor.match" = { fg = "#e0b000", modifiers = ["bold"] }

# Mode indicator colors in the status line
"ui.statusline.normal" = { fg = "green156", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "blue34", bg = "red213", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "blue34", bg = "blue184", modifiers = ["bold"] }

# Hilight symbols
"ui.highlight" = { bg = "#394143" }

"hint" = "#c8a000"
"diagnostic.hint" = { fg = "#c8a000" }
