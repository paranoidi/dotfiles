theme = "jetbrains_dark_fixed"

[editor]
line-number = "relative"
color-modes = true
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "warning" # show warnings and errors on the cursorline inline

# Git diff gutter — shows +/-/~ bars for lines changed vs git index
[editor.gutters]
layout = ["diff", "diagnostics", "spacer", "line-numbers", "spacer"]

# Status line — includes "version-control" on the right for git branch
[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "version-control"]
separator = "│"
mode.normal = "NOR"
mode.insert = "INS"
mode.select = "SEL"

# Lazygit integration (Ctrl+g): saves all buffers, opens lazygit in a temp
# buffer, auto-closes it on exit, redraws and reloads to clear stale gutters
[keys.normal]
C-g = [":write-all", ":new", ":insert-output lazygit", ":buffer-close!", ":redraw", ":reload-all"]
tab = "move_parent_node_end"
S-tab = "move_parent_node_start"
C-r = [
    ":write-all",
    ":insert-output scooter --no-stdin >/dev/tty",
    ":redraw",
    ":reload-all"
]

[keys.insert]
S-tab = "move_parent_node_start"

[keys.select]
tab = "extend_parent_node_end"
S-tab = "extend_parent_node_start"

